server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: iot-monitor

  datasource:
    url: jdbc:h2:mem:iot_monitor;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: smtp.example.com
    port: 587
    username: noreply@example.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mqtt:
  enabled: false
  broker-url: tcp://localhost:1883
  username:
  password:
  client-id: iot-monitor-server
  topic: iot/data/#
  qos: 1

logging:
  level:
    com.iot.monitor: DEBUG
    org.springframework.integration: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
