server:
  port: 8080

spring:
  application:
    name: iot-monitor-prod

  datasource:
    url: jdbc:mysql://localhost:3306/iot_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: password
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  mail:
    host: smtp.example.com
    port: 587
    username: alert@example.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mqtt:
  enabled: true
  broker-url: tcp://localhost:1883
  username: iot_user
  password: iot_password
  client-id: iot-monitor-server
  topic: iot/data/#
  qos: 1

logging:
  level:
    com.iot.monitor: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/iot-monitor/iot-monitor.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
